extensions:
  front-matter:
    enabled: true
  markdown-tables:
    enabled: true

plugins:
  md013:
    enabled: true
    line_length: 120
    code_blocks: false
    tables: false
    table_line_length: 1000
  md009:
    enabled: true
    br_spaces: 0
    strict: true
    list_item_empty_lines: false
  md012:
    enabled: true
    maximum: 1
  md004:
    enabled: true
    style: dash
  md007:
    enabled: true
    indent: 2
    start_indented: false
  md048:
    enabled: true
    style: backtick
  md041:
    enabled: false
